<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>바코드 재고관리 - 본비반트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overscroll-behavior: none;
        }
        .scan-input {
            font-size: 18px;
            padding: 16px;
            border: 3px solid #3b82f6;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .scan-input:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
        }
        .item-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .item-card:active {
            transform: scale(0.98);
        }
        .qty-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qty-btn:active {
            transform: scale(0.9);
        }
        .qty-input {
            width: 80px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
        }
        .action-btn {
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: #f3f4f6;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f3f4f6;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 sticky top-0 z-50">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-barcode text-2xl"></i>
                <div>
                    <h1 class="text-lg font-bold">바코드 재고관리</h1>
                    <p class="text-xs text-blue-200">본비반트 ERP</p>
                </div>
            </div>
            <button onclick="showHistory()" class="p-2 bg-white/20 rounded-lg">
                <i class="fas fa-history text-xl"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4 pb-32">
        <!-- Barcode Input Section -->
        <div class="bg-white rounded-2xl p-4 shadow-lg mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-2">
                <i class="fas fa-qrcode mr-1"></i> 바코드 스캔/입력
            </label>
            <input type="text" id="barcodeInput" class="scan-input w-full" 
                   placeholder="바코드를 스캔하세요"
                   inputmode="numeric"
                   autocomplete="off"
                   autofocus>
            <p class="text-xs text-gray-400 mt-2 text-center">
                <i class="fas fa-info-circle mr-1"></i>
                Barcode Scanner 앱에서 스캔하면 자동 입력됩니다
            </p>
        </div>

        <!-- Tabs -->
        <div class="flex rounded-xl overflow-hidden mb-4 shadow">
            <button class="tab-btn active" data-tab="usage" onclick="switchTab('usage')">
                <i class="fas fa-minus-circle mr-1"></i> 사용등록
            </button>
            <button class="tab-btn" data-tab="inbound" onclick="switchTab('inbound')">
                <i class="fas fa-plus-circle mr-1"></i> 입고등록
            </button>
            <button class="tab-btn" data-tab="query" onclick="switchTab('query')">
                <i class="fas fa-search mr-1"></i> 재고조회
            </button>
        </div>

        <!-- Scanned Item Display -->
        <div id="scannedItem" class="hidden">
            <div class="item-card">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <span id="itemCategory" class="badge bg-blue-100 text-blue-700 mb-1">원료</span>
                        <h3 id="itemName" class="text-lg font-bold text-gray-800">품목명</h3>
                        <p id="itemCode" class="text-sm text-gray-500">코드: -</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-500">현재고</p>
                        <p id="currentStock" class="text-2xl font-bold text-blue-600">0</p>
                        <p id="stockUnit" class="text-sm text-gray-500">kg</p>
                    </div>
                </div>
                
                <!-- LOT Selection (for usage) -->
                <div id="lotSection" class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-2">
                        <i class="fas fa-layer-group mr-1"></i> LOT 선택 (선입선출)
                    </label>
                    <select id="lotSelect" class="w-full p-3 border-2 border-gray-200 rounded-xl text-base">
                        <option value="">LOT를 선택하세요</option>
                    </select>
                </div>

                <!-- Quantity Input -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-2">
                        <i class="fas fa-balance-scale mr-1"></i> 수량
                    </label>
                    <div class="flex items-center justify-center gap-4">
                        <button class="qty-btn bg-red-100 text-red-600" onclick="adjustQty(-1)">-</button>
                        <input type="number" id="qtyInput" class="qty-input" value="1" step="0.1" min="0">
                        <button class="qty-btn bg-green-100 text-green-600" onclick="adjustQty(1)">+</button>
                    </div>
                </div>

                <!-- Quick Qty Buttons -->
                <div class="flex gap-2 mb-4 flex-wrap justify-center">
                    <button onclick="setQty(0.5)" class="px-4 py-2 bg-gray-100 rounded-lg text-sm font-medium">0.5</button>
                    <button onclick="setQty(1)" class="px-4 py-2 bg-gray-100 rounded-lg text-sm font-medium">1</button>
                    <button onclick="setQty(5)" class="px-4 py-2 bg-gray-100 rounded-lg text-sm font-medium">5</button>
                    <button onclick="setQty(10)" class="px-4 py-2 bg-gray-100 rounded-lg text-sm font-medium">10</button>
                    <button onclick="setQty(25)" class="px-4 py-2 bg-gray-100 rounded-lg text-sm font-medium">25</button>
                </div>

                <!-- Memo -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-2">
                        <i class="fas fa-comment mr-1"></i> 메모 (선택)
                    </label>
                    <input type="text" id="memoInput" class="w-full p-3 border-2 border-gray-200 rounded-xl" 
                           placeholder="사용 용도 입력">
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12">
            <i class="fas fa-barcode text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">바코드를 스캔하세요</p>
            <p class="text-gray-400 text-sm mt-2">스캔한 품목이 여기에 표시됩니다</p>
        </div>

        <!-- Not Found State -->
        <div id="notFoundState" class="hidden text-center py-8">
            <div class="bg-yellow-50 rounded-2xl p-6">
                <i class="fas fa-exclamation-triangle text-4xl text-yellow-500 mb-3"></i>
                <p class="text-gray-700 font-medium mb-1">등록되지 않은 바코드</p>
                <p id="notFoundBarcode" class="text-gray-500 text-sm font-mono mb-4">-</p>
                <button onclick="showRegisterModal()" class="action-btn bg-yellow-500 text-white w-full">
                    <i class="fas fa-plus"></i> 바코드 등록하기
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Action Button -->
    <div id="actionSection" class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t shadow-lg hidden">
        <button id="actionBtn" onclick="submitAction()" class="action-btn bg-blue-600 text-white w-full">
            <i class="fas fa-check"></i> <span id="actionBtnText">사용 등록</span>
        </button>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="fixed inset-0 bg-black/50 z-50 hidden">
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[80vh] overflow-hidden">
            <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
                <h2 class="text-lg font-bold">스캔 이력</h2>
                <button onclick="closeHistory()" class="p-2">
                    <i class="fas fa-times text-xl text-gray-500"></i>
                </button>
            </div>
            <div id="historyList" class="overflow-y-auto max-h-[60vh] p-4">
                <!-- History items will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="bg-white rounded-2xl p-6 text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-3"></i>
            <p class="text-gray-700 font-medium">처리 중...</p>
        </div>
    </div>

    <script>
        // Global state
        let currentItem = null;
        let currentTab = 'usage';
        let scanHistory = JSON.parse(localStorage.getItem('bv_scan_history') || '[]');

        // API base
        const API_BASE = '/api';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const barcodeInput = document.getElementById('barcodeInput');
            
            // Auto-focus on barcode input
            barcodeInput.focus();
            
            // Handle barcode input (from scanner app or manual)
            barcodeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleBarcodeScan(barcodeInput.value.trim());
                }
            });
            
            // Also handle input event for scanners that don't send Enter
            let scanTimeout;
            barcodeInput.addEventListener('input', (e) => {
                clearTimeout(scanTimeout);
                const value = e.target.value.trim();
                
                // If barcode length is typical (8-14 digits), auto-search after brief delay
                if (value.length >= 8) {
                    scanTimeout = setTimeout(() => {
                        handleBarcodeScan(value);
                    }, 300);
                }
            });
            
            // Keep focus on input
            document.addEventListener('click', (e) => {
                if (!e.target.closest('input, button, select, a')) {
                    barcodeInput.focus();
                }
            });
        });

        // Handle barcode scan
        async function handleBarcodeScan(barcode) {
            if (!barcode) return;
            
            console.log('Scanning barcode:', barcode);
            showLoading(true);
            
            try {
                // Search for item by barcode
                const response = await fetch(`${API_BASE}/barcode/scan?barcode=${encodeURIComponent(barcode)}`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    currentItem = result.data;
                    displayItem(result.data);
                    showToast(`${result.data.item_name} 조회 완료`, 'success');
                    
                    // Add to history
                    addToHistory(barcode, result.data);
                } else {
                    showNotFound(barcode);
                    showToast('등록되지 않은 바코드입니다', 'warning');
                }
            } catch (error) {
                console.error('Scan error:', error);
                showToast('조회 실패: ' + error.message, 'error');
            } finally {
                showLoading(false);
                // Clear input and refocus
                document.getElementById('barcodeInput').value = '';
                document.getElementById('barcodeInput').focus();
            }
        }

        // Display scanned item
        function displayItem(item) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('notFoundState').classList.add('hidden');
            document.getElementById('scannedItem').classList.remove('hidden');
            document.getElementById('actionSection').classList.remove('hidden');
            
            // Fill item data
            document.getElementById('itemName').textContent = item.item_name;
            document.getElementById('itemCode').textContent = `코드: ${item.item_code}`;
            document.getElementById('currentStock').textContent = formatNumber(item.current_stock || 0);
            document.getElementById('stockUnit').textContent = item.unit || 'ea';
            
            // Category badge
            const categoryEl = document.getElementById('itemCategory');
            categoryEl.textContent = item.category || '원료';
            if (item.category === '제품') {
                categoryEl.className = 'badge bg-purple-100 text-purple-700 mb-1';
            } else if (item.category === '부자재') {
                categoryEl.className = 'badge bg-green-100 text-green-700 mb-1';
            } else {
                categoryEl.className = 'badge bg-blue-100 text-blue-700 mb-1';
            }
            
            // Load LOT list for usage tab
            if (currentTab === 'usage' && item.lots && item.lots.length > 0) {
                document.getElementById('lotSection').classList.remove('hidden');
                const lotSelect = document.getElementById('lotSelect');
                lotSelect.innerHTML = '<option value="">자동 선택 (선입선출)</option>' +
                    item.lots.map(lot => `
                        <option value="${lot.lot_number}">
                            ${lot.lot_number} | 잔량: ${formatNumber(lot.remain_qty)} | 유효: ${lot.expiry_date || '-'}
                        </option>
                    `).join('');
            } else {
                document.getElementById('lotSection').classList.add('hidden');
            }
            
            // Reset quantity
            document.getElementById('qtyInput').value = '1';
            document.getElementById('memoInput').value = '';
            
            updateActionButton();
        }

        // Show not found state
        function showNotFound(barcode) {
            currentItem = null;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('scannedItem').classList.add('hidden');
            document.getElementById('actionSection').classList.add('hidden');
            document.getElementById('notFoundState').classList.remove('hidden');
            document.getElementById('notFoundBarcode').textContent = barcode;
        }

        // Switch tab
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            
            // Update LOT section visibility
            if (currentItem) {
                if (tab === 'usage' && currentItem.lots && currentItem.lots.length > 0) {
                    document.getElementById('lotSection').classList.remove('hidden');
                } else {
                    document.getElementById('lotSection').classList.add('hidden');
                }
            }
            
            updateActionButton();
        }

        // Update action button text
        function updateActionButton() {
            const btnText = document.getElementById('actionBtnText');
            const btn = document.getElementById('actionBtn');
            
            switch(currentTab) {
                case 'usage':
                    btnText.innerHTML = '<i class="fas fa-minus-circle mr-2"></i>사용 등록 (재고 차감)';
                    btn.className = 'action-btn bg-red-500 text-white w-full';
                    break;
                case 'inbound':
                    btnText.innerHTML = '<i class="fas fa-plus-circle mr-2"></i>입고 등록 (재고 증가)';
                    btn.className = 'action-btn bg-green-500 text-white w-full';
                    break;
                case 'query':
                    btnText.innerHTML = '<i class="fas fa-history mr-2"></i>이력 조회';
                    btn.className = 'action-btn bg-blue-500 text-white w-full';
                    break;
            }
        }

        // Adjust quantity
        function adjustQty(delta) {
            const input = document.getElementById('qtyInput');
            let value = parseFloat(input.value) || 0;
            value = Math.max(0, value + delta);
            input.value = value;
        }

        // Set quantity
        function setQty(value) {
            document.getElementById('qtyInput').value = value;
        }

        // Submit action
        async function submitAction() {
            if (!currentItem) {
                showToast('품목을 먼저 스캔하세요', 'warning');
                return;
            }
            
            const qty = parseFloat(document.getElementById('qtyInput').value) || 0;
            if (qty <= 0) {
                showToast('수량을 입력하세요', 'warning');
                return;
            }
            
            const memo = document.getElementById('memoInput').value.trim();
            const lotNumber = document.getElementById('lotSelect')?.value || null;
            
            showLoading(true);
            
            try {
                let endpoint, payload;
                
                switch(currentTab) {
                    case 'usage':
                        endpoint = `${API_BASE}/barcode/usage`;
                        payload = {
                            item_code: currentItem.item_code,
                            quantity: qty,
                            lot_number: lotNumber,
                            memo: memo || '바코드 스캔 사용등록'
                        };
                        break;
                    case 'inbound':
                        endpoint = `${API_BASE}/barcode/inbound`;
                        payload = {
                            item_code: currentItem.item_code,
                            quantity: qty,
                            memo: memo || '바코드 스캔 입고등록'
                        };
                        break;
                    case 'query':
                        // Show history for this item
                        showItemHistory(currentItem.item_code);
                        showLoading(false);
                        return;
                }
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message || '등록 완료!', 'success');
                    
                    // Update current stock display
                    if (currentTab === 'usage') {
                        currentItem.current_stock = (currentItem.current_stock || 0) - qty;
                    } else if (currentTab === 'inbound') {
                        currentItem.current_stock = (currentItem.current_stock || 0) + qty;
                    }
                    document.getElementById('currentStock').textContent = formatNumber(currentItem.current_stock);
                    
                    // Add to history
                    addToHistory(currentItem.barcode || currentItem.item_code, currentItem, currentTab, qty);
                    
                    // Reset
                    document.getElementById('qtyInput').value = '1';
                    document.getElementById('memoInput').value = '';
                } else {
                    showToast(result.error || '등록 실패', 'error');
                }
            } catch (error) {
                console.error('Submit error:', error);
                showToast('처리 실패: ' + error.message, 'error');
            } finally {
                showLoading(false);
                document.getElementById('barcodeInput').focus();
            }
        }

        // Add to local history
        function addToHistory(barcode, item, action = 'scan', qty = null) {
            const historyItem = {
                barcode,
                item_code: item.item_code,
                item_name: item.item_name,
                action,
                qty,
                timestamp: new Date().toISOString()
            };
            
            scanHistory.unshift(historyItem);
            scanHistory = scanHistory.slice(0, 100); // Keep last 100
            localStorage.setItem('bv_scan_history', JSON.stringify(scanHistory));
        }

        // Show history modal
        function showHistory() {
            const historyList = document.getElementById('historyList');
            
            if (scanHistory.length === 0) {
                historyList.innerHTML = '<p class="text-center text-gray-500 py-8">스캔 이력이 없습니다</p>';
            } else {
                historyList.innerHTML = scanHistory.map(h => {
                    const time = new Date(h.timestamp).toLocaleString('ko-KR');
                    const actionBadge = h.action === 'usage' ? 
                        '<span class="badge bg-red-100 text-red-700">사용</span>' :
                        h.action === 'inbound' ?
                        '<span class="badge bg-green-100 text-green-700">입고</span>' :
                        '<span class="badge bg-gray-100 text-gray-700">조회</span>';
                    
                    return `
                        <div class="history-item">
                            <div>
                                <p class="font-medium text-gray-800">${h.item_name}</p>
                                <p class="text-sm text-gray-500">${h.barcode}</p>
                                <p class="text-xs text-gray-400">${time}</p>
                            </div>
                            <div class="text-right">
                                ${actionBadge}
                                ${h.qty ? `<p class="font-bold mt-1">${h.action === 'usage' ? '-' : '+'}${h.qty}</p>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('historyModal').classList.remove('hidden');
        }

        // Close history modal
        function closeHistory() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        // Show item transaction history
        async function showItemHistory(itemCode) {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/barcode/history?item_code=${encodeURIComponent(itemCode)}`);
                const result = await response.json();
                
                // TODO: Show in modal
                console.log('Item history:', result);
                showToast('이력 조회 완료 (콘솔 확인)', 'info');
            } catch (error) {
                showToast('이력 조회 실패', 'error');
            } finally {
                showLoading(false);
            }
        }

        // Show register modal (for unknown barcodes)
        function showRegisterModal() {
            const barcode = document.getElementById('notFoundBarcode').textContent;
            // Redirect to main ERP barcode registration
            if (confirm(`바코드 "${barcode}"를 등록하시겠습니까?\n\nERP 관리자 화면으로 이동합니다.`)) {
                window.open(`/?barcode=${encodeURIComponent(barcode)}#admin`, '_blank');
            }
        }

        // Show loading overlay
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // Show toast message
        function showToast(message, type = 'info') {
            // Remove existing toast
            document.querySelectorAll('.toast').forEach(t => t.remove());
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            
            const toast = document.createElement('div');
            toast.className = `toast ${colors[type] || colors.info}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // Format number
        function formatNumber(num) {
            if (num === null || num === undefined) return '0';
            return parseFloat(num).toLocaleString('ko-KR', { maximumFractionDigits: 2 });
        }
    </script>
</body>
</html>
